name: Zaffari Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Mostrar host e porta do DATABASE_URL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node -e "const u=new URL(process.env.DATABASE_URL); console.log('HOST=' + u.hostname); console.log('PORT=' + (u.port || '(vazia)')); console.log('USER=' + u.username)"

      - name: Rodar scraper do Zaffari
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        run: npm run scrape:zaffari
